<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Country Info Finder</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <h1>🌍 Country Info Finder</h1>

    <div class="controls">
      <input type="text" id="searchInput" placeholder="Search for a country..." />

      <select id="regionFilter">
        <option value="all">All Regions</option>
        <option value="Africa">Africa</option>
        <option value="Americas">Americas</option>
        <option value="Asia">Asia</option>
        <option value="Europe">Europe</option>
        <option value="Oceania">Oceania</option>
      </select>

      <button id="themeBtn">🌙 Dark Mode</button>
    </div>
  </header>

  <main>
    <div id="countriesContainer" class="countries-grid"></div>
  </main>

  <div id="countryModal" class="modal hidden">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
